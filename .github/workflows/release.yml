name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Determine release channel
        id: channel
        # Routes each tag push to either the alpha or stable lane based on the
        # package.json version string. Alpha releases (e.g. 0.5.0-alpha.2) get
        # published to the `alpha` npm dist-tag, marked prerelease on GitHub,
        # and skip the MCP Registry. Stable releases (e.g. 0.5.0) use the default
        # `latest` dist-tag and publish everywhere.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error ::Git tag v$TAG_VERSION does not match package.json version $VERSION. Re-tag or re-run npm version."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Whitelist exact shapes so unrecognized prerelease identifiers
          # (e.g. -beta.1, -rc.0, typos like -alph.1) never silently ship to
          # the stable dist-tag. Stable is MAJOR.MINOR.PATCH with no suffix;
          # alpha is MAJOR.MINOR.PATCH-alpha.N; anything else fails the build.
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Unrecognized version shape '$VERSION'. Expected X.Y.Z (stable) or X.Y.Z-alpha.N (alpha)."
            exit 1
          fi
          echo "Version: $VERSION"
          cat "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify bundled coa CLI matches pinned version
        run: node scripts/verify-coa-pin.mjs

      - name: coa CLI smoke test
        run: node scripts/smoke-coa.mjs

      - name: Copy generated assets for tests
        run: cp -r generated src/generated

      - name: Test
        run: |
          timeout --kill-after=10 30 npx vitest run --exclude 'tests/integration/live-api.test.ts' \
            && exit 0 || [ $? -eq 124 ]

      - name: Publish to npm
        run: npm publish --tag ${{ steps.channel.outputs.npm_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm registry propagation
        run: |
          echo "Waiting 30s for npm registry to propagate..."
          sleep 30
          npm view coalesce-transform-mcp@${{ steps.channel.outputs.version }} version

      # --- stable-only: MCP Registry publish ---
      - name: Install mcp-publisher
        if: steps.channel.outputs.channel == 'stable'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: steps.channel.outputs.channel == 'stable'
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: steps.channel.outputs.channel == 'stable'
        run: ./mcp-publisher publish

      # --- both channels: GitHub Release (marked prerelease for alphas) ---
      - name: Create GitHub Release
        run: |
          ARGS=(--title "${{ github.ref_name }}" --generate-notes)
          if [ "${{ steps.channel.outputs.is_prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${{ github.ref_name }}" "${ARGS[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

      # --- stable-only: keep @alpha dist-tag at least as new as @latest ---
      # Implements "Option A" from docs/RELEASES.md after every stable ship:
      # keep @alpha at a version at least as new as @latest so users pinning
      # `coalesce-transform-mcp@alpha` for testing don't end up on a version
      # strictly behind stable. Skipped when the current @alpha is on a
      # strictly newer base version (0.N+1 cycle already in flight). The
      # NPM_TOKEN automation token bypasses 2FA so no passkey/OTP dance.
      - name: Advance @alpha dist-tag to stable (if no newer cycle in flight)
        if: steps.channel.outputs.channel == 'stable'
        run: |
          PKG=$(node -p "require('./package.json').name")
          STABLE="${{ steps.channel.outputs.version }}"
          CURRENT_ALPHA=$(npm view "$PKG" dist-tags.alpha 2>/dev/null || true)

          if [ -z "$CURRENT_ALPHA" ]; then
            echo "::notice ::No @alpha dist-tag set. Pointing it at ${STABLE}."
            npm dist-tag add "${PKG}@${STABLE}" alpha
            exit 0
          fi

          # Strip any prerelease suffix and compare base versions via sort -V
          # (numeric-aware, so 0.10.0 orders correctly after 0.9.0).
          CURRENT_BASE=${CURRENT_ALPHA%%-*}
          HIGHER=$(printf '%s\n%s\n' "$CURRENT_BASE" "$STABLE" | sort -V | tail -n 1)

          if [ "$HIGHER" = "$CURRENT_BASE" ] && [ "$CURRENT_BASE" != "$STABLE" ]; then
            echo "::notice ::@alpha (${CURRENT_ALPHA}) is on a newer base than ${STABLE}; leaving it alone."
          else
            echo "::notice ::Advancing @alpha from ${CURRENT_ALPHA} to ${STABLE}."
            npm dist-tag add "${PKG}@${STABLE}" alpha
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
