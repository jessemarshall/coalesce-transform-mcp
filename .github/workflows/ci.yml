name: CI

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy generated assets for tests
        run: cp -r generated src/generated

      - name: Test
        run: npm test

      - name: Pack smoke test
        run: npm pack --dry-run
